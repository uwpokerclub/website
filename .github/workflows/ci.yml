name: "Continuous Integration"

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/CODEOWNERS"
      - ".github/release.yml"
      - ".github/dependabot.yml"
      - ".github/pull_request_template.md"
      - "LICENSE"
      - ".gitattributes"
      - ".gitignore"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      image-tag: ${{ github.sha }}
    secrets: inherit

  webapp-tests:
    uses: ./.github/workflows/webapp-tests.yml
    secrets: inherit

  server-tests:
    uses: ./.github/workflows/server-tests.yml
    secrets: inherit

  e2e:
    needs: [build]
    uses: ./.github/workflows/e2e.yml
    with:
      image-tag: ${{ github.sha }}
    secrets: inherit

  push:
    if: github.event_name == 'push'
    needs: [e2e, webapp-tests, server-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
    - uses: actions/checkout@v5
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build image
      uses: docker/build-push-action@v7
      with:
        context: .
        load: true
        tags: website:${{ github.sha }}
        build-args: GITHUB_PACKAGE_TOKEN=${{ secrets.GITHUB_TOKEN }}
        cache-from: type=gha
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: '${{ secrets.GCP_WIP }}'
        service_account: '${{ secrets.GCP_SA }}'
    - name: Configure Docker
      run: gcloud auth configure-docker us-east1-docker.pkg.dev
    - name: Tag the image
      run: |
        docker tag website:${{ github.sha }} us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/uwpokerclub-docker/website:$(echo ${{ github.ref_name }} | tr '/' '-')
    - name: Push the image
      run: |
        docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/uwpokerclub-docker/website:$(echo ${{ github.ref_name }} | tr '/' '-')

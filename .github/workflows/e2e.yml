name: E2E Tests

on:
  workflow_call:
    inputs:
      image-tag:
        description: "Tag for the Docker image"
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  SHARD_COUNT: 3

jobs:
  shard-specs:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.balance.outputs.matrix }}
    steps:
      - name: Checkout spec files
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            cypress/e2e
            .github/scripts
      - name: Balance specs across shards
        id: balance
        run: node .github/scripts/balance-shards.js

  run-shard:
    needs: [shard-specs]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.shard-specs.outputs.matrix) }}
    env:
      TZ: America/New_York
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: GITHUB_PACKAGE_TOKEN=${{ secrets.GITHUB_TOKEN }} npm ci
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: website:${{ inputs.image-tag }}
          build-args: |
            GO_BUILD_TAGS=e2e
          secrets: |
            GITHUB_PACKAGE_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
      - name: Setup Docker network
        run: docker network create uwpokerclub_services_network
      - name: Start PostgreSQL container
        run: docker run --name postgres --network uwpokerclub_services_network -e POSTGRES_PASSWORD=password -e POSTGRES_DB=uwpokerclub -e TZ=America/New_York -p 5432:5432 -d postgres:17-alpine
      - name: Wait for PostgreSQL to be ready
        run: |
          ready=false
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" = false ]; then
            echo "PostgreSQL not ready after 30 seconds"
            exit 1
          fi
      - name: Start server
        run: docker run --name server --network uwpokerclub_services_network -e DATABASE_URL=postgres://postgres:password@postgres:5432/uwpokerclub?sslmode=disable -e ENVIRONMENT=test -e GIN_MODE=release -e PORT=5000 -p 5000:5000 -d website:${{ inputs.image-tag }}
      - name: Wait for server to be ready
        run: |
          ready=false
          for i in {1..30}; do
            if curl -s http://localhost:5000/api/health | grep "ok"; then
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" = false ]; then
            echo "Server not ready after 30 seconds"
            echo "=== Server logs ==="
            docker logs server
            exit 1
          fi
      - name: Run E2E tests (shard ${{ matrix.shard }})
        uses: cypress-io/github-action@v7
        with:
          install: false
          spec: ${{ matrix.specs }}
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-shard-${{ matrix.shard }}
          path: cypress/screenshots
      - name: Upload videos
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-videos-shard-${{ matrix.shard }}
          path: cypress/videos

  e2e:
    if: always()
    needs: [run-shard]
    runs-on: ubuntu-latest
    steps:
      - name: Check shard results
        run: |
          if [ "${{ needs.run-shard.result }}" != "success" ]; then
            echo "One or more shards failed"
            exit 1
          fi

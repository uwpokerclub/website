name: Publish
on:
  release:
    types: [created]
jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      image-tag: ${{ github.sha }}
    secrets: inherit

  webapp-tests:
    uses: ./.github/workflows/webapp-tests.yml
    secrets: inherit

  server-tests:
    uses: ./.github/workflows/server-tests.yml
    secrets: inherit

  e2e:
    needs: [build, webapp-tests, server-tests]
    uses: ./.github/workflows/e2e.yml
    with:
      image-tag: ${{ github.sha }}
    secrets: inherit

  push:
    name: Push Docker image to GCP Artifact Registry
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
      packages: 'read'
    needs: e2e
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: '${{ secrets.GCP_WIP }}'
          service_account: '${{ secrets.GCP_SA }}'
      - name: Configure Docker
        run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - name: Build the Docker image
        run: docker build --secret id=GITHUB_PACKAGE_TOKEN,env=GITHUB_PACKAGE_TOKEN --rm --no-cache -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/uwpokerclub-docker/website:${GITHUB_REF##*/} -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/uwpokerclub-docker/website:latest .
        env:
          GITHUB_PACKAGE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push the tagged Docker image
        run: |
          docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/uwpokerclub-docker/website:${GITHUB_REF##*/}
          docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/uwpokerclub-docker/website:latest
  deploy:
    name: Deploy version to Google Cloud
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    needs: push
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: '${{ secrets.GCP_WIP }}'
          service_account: '${{ secrets.GCP_SA }}'
      - name: Deploy
        run: gcloud run deploy website --region=us-east1 --image=us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/uwpokerclub-docker/website:${GITHUB_REF##*/}

name: Webapp Tests

on:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  webapp-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        run: GITHUB_PACKAGE_TOKEN=${{ secrets.GITHUB_TOKEN }} npm ci
      - name: Lint source code
        run: npm run lint
      - name: Run tests
        run: npm test
